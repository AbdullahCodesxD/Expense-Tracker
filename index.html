<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Document</title>
    <link rel="stylesheet" href="style/index.css" />
  </head>
  <body>
    <section id="expense-parent">
      <form id="add-expense">
        <div class="form-header">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M13 7h-2v4H7v2h4v4h2v-4h4v-2h-4V7zm-1-5C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"
            />
          </svg>
          <h2>Add New Expense</h2>
        </div>

        <div class="input-group">
          <label>Expense Title</label>
          <input class="title" type="text" placeholder="Dinner at Restaurant" />
        </div>

        <div class="input-group">
          <label>Amount ($)</label>
          <input class="amount" type="number" placeholder="50.00" step="0.01" />
        </div>

        <div class="input-group">
          <label>Category</label>
          <input
            class="category"
            type="text"
            placeholder="Food, Transport, etc."
          />
        </div>

        <div class="input-group">
          <label>Date</label>
          <input class="date" type="date" />
        </div>

        <button class="btn btn-main">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
            width="20"
            height="20"
          >
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
          </svg>
          Add Expense
        </button>
      </form>
      <div id="expenses" class="expenses">
        <div class="expenses-header">
          <h2>Expense Tracker</h2>
          <div class="total-expenses">$0.00</div>
        </div>
        <div class="expenses-empty">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="currentColor"
          >
            <path
              d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"
            />
          </svg>
          <h3>No expenses yet</h3>
          <p>Add your first expense to get started!</p>
        </div>
      </div>
    </section>

    <script type="module">
      import ExpenseController from "./controllers/expense.controller.js";
      new ExpenseController();
    </script>
  </body>
</html>
